<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOREX CHECKLIST</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.08);
    --border-bright: rgba(255,255,255,0.15);
    --text: #e8e8f0;
    --muted: #6b6b80;
    --accent: #c8f04a;
    --accent-dim: rgba(200,240,74,0.12);
    --accent-dim2: rgba(200,240,74,0.06);
    --red: #ff4d6d;
    --red-dim: rgba(255,77,109,0.12);
    --amber: #ffb830;
    --amber-dim: rgba(255,184,48,0.12);
    --green: #4dffb4;
    --green-dim: rgba(77,255,180,0.1);
    --blue: #4da6ff;
    --blue-dim: rgba(77,166,255,0.1);
    --radius: 10px;
    --radius-lg: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,240,74,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,240,74,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .logo span {
    color: var(--muted);
    font-weight: 400;
  }

  .time-display {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    text-align: right;
  }

  #clock {
    display: block;
    font-size: 20px;
    color: var(--text);
    margin-top: 2px;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: var(--border-bright); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .card-icon {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .card-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Form rows */
  .field-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .field-row:last-child { margin-bottom: 0; }

  .field-label {
    font-size: 13px;
    color: var(--muted);
    min-width: 180px;
    flex-shrink: 0;
  }

  input[type=time], input[type=number], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type=time]:focus, input[type=number]:focus, select:focus {
    border-color: var(--accent);
  }

  input[type=time] { width: 110px; }
  input[type=number] { width: 80px; }
  select { flex: 1; cursor: pointer; }

  select option { background: var(--surface2); }

  .sep { color: var(--muted); font-size: 12px; }

  /* Pair toggles */
  .pairs { display: flex; gap: 8px; flex-wrap: wrap; }

  .pair-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .pair-btn:hover { border-color: var(--border-bright); color: var(--text); }

  .pair-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Trade input row */
  .trade-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .res-btns { display: flex; gap: 6px; }

  .res-btn {
    padding: 7px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    font-size: 13px;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .res-btn.win:hover { border-color: var(--green); color: var(--green); }
  .res-btn.win.active { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .res-btn.loss:hover { border-color: var(--red); color: var(--red); }
  .res-btn.loss.active { background: var(--red-dim); border-color: var(--red); color: var(--red); }

  /* Buttons */
  .btn {
    padding: 8px 18px;
    border-radius: var(--radius);
    border: 1px solid var(--border-bright);
    font-size: 13px;
    cursor: pointer;
    background: transparent;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0a0f;
    font-weight: 600;
  }

  .btn-primary:hover { background: #d4f55c; border-color: #d4f55c; color: #0a0a0f; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-block { width: 100%; text-align: center; padding: 10px; }

  .btn-reset {
    background: none;
    border: none;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
    font-family: 'DM Sans', sans-serif;
    padding: 0;
  }

  .btn-reset:hover { color: var(--text); }

  /* Trades list */
  .trades-list { margin-top: 12px; display: flex; flex-direction: column; gap: 5px; }

  .trade-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border-radius: var(--radius);
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 13px;
  }

  .trade-pair { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 12px; }
  .trade-time { color: var(--muted); font-size: 12px; }

  .badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .badge.win { background: var(--green-dim); color: var(--green); border: 1px solid rgba(77,255,180,0.3); }
  .badge.loss { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,77,109,0.3); }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

  /* Check result */
  .result-box {
    margin-top: 1rem;
    padding: 1rem 1.25rem;
    border-radius: var(--radius);
    display: none;
  }

  .result-box.show { display: block; }
  .result-box.ok { background: var(--green-dim); border: 1px solid rgba(77,255,180,0.3); }
  .result-box.stop { background: var(--red-dim); border: 1px solid rgba(255,77,109,0.4); }

  .result-title {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .result-box.ok .result-title { color: var(--green); }
  .result-box.stop .result-title { color: var(--red); }

  .rule-line {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    margin-bottom: 4px;
    color: var(--text);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.fail { background: var(--red); box-shadow: 0 0 6px var(--red); }

  /* Direction select */
  .dir-select { display: flex; gap: 8px; margin-bottom: 1.25rem; }

  .dir-btn {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    text-align: center;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }

  .dir-btn:hover { border-color: var(--border-bright); color: var(--text); }
  .dir-btn.active-long { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .dir-btn.active-short { background: var(--red-dim); border-color: var(--red); color: var(--red); }

  /* Upload */
  .upload-area {
    border: 1px dashed var(--border-bright);
    border-radius: var(--radius-lg);
    padding: 2rem 1.5rem;
    text-align: center;
    cursor: pointer;
    background: var(--surface2);
    position: relative;
    transition: all 0.2s;
  }

  .upload-area:hover { border-color: var(--accent); background: var(--accent-dim2); }

  .upload-area input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
    font-size: 0;
  }

  .upload-icon { font-size: 28px; margin-bottom: 8px; }

  .upload-label {
    font-size: 14px;
    color: var(--muted);
  }

  .upload-label strong { color: var(--accent); }

  .upload-hint { font-size: 12px; color: var(--muted); margin-top: 5px; opacity: 0.7; }

  /* Preview */
  .preview-wrap { position: relative; margin-bottom: 1rem; }

  .preview-wrap img {
    width: 100%;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: block;
  }

  .remove-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(10,10,15,0.8);
    border: 1px solid var(--border-bright);
    border-radius: 50%;
    width: 30px;
    height: 30px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    backdrop-filter: blur(4px);
    line-height: 1;
  }

  /* AI result */
  .ai-rules { border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 1rem; }

  .ai-rule {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .ai-rule:last-child { border-bottom: none; }

  .ai-rule-icon {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    width: 20px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .ai-rule-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .ai-rule-note { font-size: 12px; color: var(--muted); line-height: 1.5; }

  .verdict {
    margin-top: 1rem;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .verdict.long { background: var(--green-dim); color: var(--green); border: 1px solid rgba(77,255,180,0.3); }
  .verdict.short-v { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,77,109,0.3); }
  .verdict.no { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(255,184,48,0.3); }

  .ai-summary { font-size: 13px; color: var(--muted); margin-top: 10px; line-height: 1.6; }

  .status-msg { font-size: 13px; color: var(--muted); padding: 8px 0; }
  .err-msg { font-size: 13px; color: var(--red); background: var(--red-dim); border-radius: var(--radius); padding: 10px 14px; margin-top: 8px; border: 1px solid rgba(255,77,109,0.3); }

  /* Info box */
  .info-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  /* Loading */
  .loading-wrap { text-align: center; padding: 1.5rem; color: var(--muted); font-size: 13px; }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 10px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Footer */
  footer {
    text-align: center;
    padding-top: 2rem;
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    opacity: 0.5;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .field-label { min-width: 130px; font-size: 12px; }
    .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .stat-num { font-size: 20px; }
    header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .time-display { text-align: left; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <div class="logo">FOREX<span>/</span>CHECKLIST</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px;font-family:'Space Mono',monospace;">GOLD · USDJPY · M15</div>
    </div>
    <div class="time-display">
      <span style="text-transform:uppercase;letter-spacing:0.08em;">Aktuální čas</span>
      <span id="clock">--:--:--</span>
    </div>
  </header>


  <!-- AI ANALÝZA -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon" style="background:rgba(200,240,74,0.15);color:var(--accent);">◎</div>
      <div class="card-title">AI analýza grafu</div>
    </div>

    <div class="dir-select">
      <button class="dir-btn" id="dirLong" onclick="setDir('long')">LONG setup</button>
      <button class="dir-btn" id="dirShort" onclick="setDir('short')">SHORT setup</button>
    </div>

    <div id="uploadSection">
      <div class="upload-area">
        <input type="file" accept="image/*" id="fileInput" onchange="handleFile(event)">
        <div class="upload-icon">📊</div>
        <div class="upload-label">Přetáhni screenshot nebo <strong>klikni pro výběr</strong></div>
        <div class="upload-hint">PNG, JPG · graf s EMA 17, EMA 63, CCI 17, CCI 63</div>
      </div>
    </div>

    <div id="previewSection" style="display:none;">
      <div class="preview-wrap">
        <img id="previewImg" src="" alt="Graf">
        <button class="remove-btn" onclick="removeImage()">×</button>
      </div>
      <div class="info-box" id="infoBox">Vyber Long nebo Short setup výše.</div>
      <button class="btn btn-primary btn-block" id="analyzeBtn" onclick="analyzeChart()">Analyzovat graf</button>
      <div id="statusMsg"></div>
    </div>

    <div id="aiResult"></div>
  </div>

  <footer>FOREX CHECKLIST · EMA 17/63 · CCI 17/63 · v1.0</footer>
</div>

<script>
let selectedDir = null;
let imageBase64 = null;
let imageMime = 'image/jpeg';

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
updateClock();
setInterval(updateClock, 1000);

// Pair toggles
document.querySelectorAll('.pair-btn').forEach(btn => {
  btn.addEventListener('click', () => btn.classList.toggle('active'));
});

// Direction
function setDir(d) {
  selectedDir = d;
  document.getElementById('dirLong').className = 'dir-btn' + (d === 'long' ? ' active-long' : '');
  document.getElementById('dirShort').className = 'dir-btn' + (d === 'short' ? ' active-short' : '');
  updateInfoBox();
}

function updateInfoBox() {
  const box = document.getElementById('infoBox');
  if (!selectedDir) { box.innerHTML = 'Vyber Long nebo Short setup výše.'; return; }
  box.innerHTML = `Zkontroluju <strong style="color:${selectedDir==='long'?'var(--green)':'var(--red)'}">${selectedDir.toUpperCase()} setup</strong> — vyhodnotím všechna 4 pravidla tvého systému.`;
}

// File upload
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  imageMime = ['image/jpeg','image/png','image/gif','image/webp'].includes(file.type) ? file.type : 'image/jpeg';
  const reader = new FileReader();
  reader.onload = ev => {
    imageBase64 = ev.target.result.split(',')[1];
    document.getElementById('previewImg').src = ev.target.result;
    document.getElementById('uploadSection').style.display = 'none';
    document.getElementById('previewSection').style.display = 'block';
    document.getElementById('aiResult').innerHTML = '';
    document.getElementById('statusMsg').innerHTML = '';
    updateInfoBox();
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  imageBase64 = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('uploadSection').style.display = 'block';
  document.getElementById('previewSection').style.display = 'none';
  document.getElementById('aiResult').innerHTML = '';
  document.getElementById('statusMsg').innerHTML = '';
}

// AI analyze — uses Claude API via proxy
async function analyzeChart() {
  if (!imageBase64) { showStatus('Nejprve nahraj obrázek grafu.', true); return; }
  if (!selectedDir) { showStatus('Vyber Long nebo Short setup.', true); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = 'Analyzuji...';
  document.getElementById('aiResult').innerHTML = '<div class="loading-wrap"><div class="spinner"></div>AI analyzuje graf...</div>';
  showStatus('', false);

  const dir = selectedDir;
  const prompt = `Jsi expert na technickou analýzu forexu. Analyzuj tento graf a zkontroluj pravidla pro ${dir.toUpperCase()} setup.

PRAVIDLA PRO ${dir.toUpperCase()}:
${dir === 'long'
  ? '1. EMA 17 je NAD EMA 63\n2. Cena zkorigovala zpět k EMA 63 po pohybu nahoru\n3. CCI 63 je mezi -80 a +80\n4. CCI 17 je pod -80'
  : '1. EMA 17 je POD EMA 63\n2. Cena zkorigovala zpět k EMA 63 po pohybu dolů\n3. CCI 63 je mezi -80 a +80\n4. CCI 17 je nad +80'}

Odpověz POUZE validním JSON objektem, bez textu před ani za, bez backticks:
{"rules":[{"id":1,"name":"EMA 17 vs EMA 63","ok":true,"note":"popis"},{"id":2,"name":"Korekce k EMA 63","ok":true,"note":"popis"},{"id":3,"name":"CCI 63 v zóně ±80","ok":true,"note":"popis"},{"id":4,"name":"CCI 17 ${dir==='long'?'pod -80':'nad +80'}","ok":true,"note":"popis"}],"verdict":"${dir}","summary":"shrnutí"}

Možné hodnoty verdict: "long", "short", "no_entry"`;

  // === SEM VLOŽ URL svého Cloudflare Workeru ===
  const WORKER_URL = 'https://forexchecker.snydr-jirka.workers.dev';

  try {
    const resp = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: imageMime, data: imageBase64 } },
          { type: 'text', text: prompt }
        ]}]
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }

    const data = await resp.json();
    const raw = (data.content || []).map(i => i.text || '').join('').trim();
    const match = raw.match(/\{[\s\S]*\}/);
    const result = JSON.parse(match ? match[0] : raw);
    renderAiResult(result);
  } catch (err) {
    document.getElementById('aiResult').innerHTML = '';
    showStatus('Chyba: ' + err.message, true);
  }

  btn.disabled = false;
  btn.textContent = 'Analyzovat graf';
}

function showStatus(msg, isError) {
  const el = document.getElementById('statusMsg');
  el.innerHTML = msg ? `<div class="${isError ? 'err-msg' : 'status-msg'}">${msg}</div>` : '';
}

function renderAiResult(result) {
  const ok = '#4dffb4', fail = '#ff4d6d';
  const rules = (result.rules || []).map(r => `
    <div class="ai-rule">
      <div class="ai-rule-icon" style="color:${r.ok ? ok : fail}">${r.ok ? '✓' : '✗'}</div>
      <div>
        <div class="ai-rule-title" style="color:${r.ok ? ok : fail}">${r.name}</div>
        <div class="ai-rule-note">${r.note || ''}</div>
      </div>
    </div>`).join('');

  const v = { long: {cls:'long',txt:'VSTUP POVOLEN — LONG'}, short: {cls:'short-v',txt:'VSTUP POVOLEN — SHORT'}, no_entry: {cls:'no',txt:'NEVSTUPOVAT'} };
  const vd = v[result.verdict] || v.no_entry;

  document.getElementById('aiResult').innerHTML = `
    <div class="ai-rules">${rules}</div>
    <div class="verdict ${vd.cls}">${vd.txt}</div>
    ${result.summary ? `<div class="ai-summary">${result.summary}</div>` : ''}`;
}



</script>
</body>
</html>
